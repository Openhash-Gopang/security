<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Security</title>
<style>
  body { margin:0; background:#001845;
    display:flex; align-items:center; justify-content:center;
    height:100vh; font-family:-apple-system,sans-serif; }
  .loading { text-align:center; color:rgba(255,255,255,.6); font-size:13px; }
  .shield { font-size:32px; margin-bottom:14px; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .bar-wrap { width:160px; height:2px; background:rgba(255,255,255,.1);
    border-radius:1px; margin:14px auto 0; overflow:hidden; }
  .bar { height:100%; width:0; background:#0f766e;
    border-radius:1px; animation:load 1s ease forwards; }
  @keyframes load { to { width:100% } }
</style>
</head>
<body>
<div class="loading">
  <div class="shield">🛡️</div>
  K-Security 로딩 중…
  <div class="bar-wrap"><div class="bar"></div></div>
</div>
<script>
(function() {
  const params  = new URLSearchParams(location.search);
  const isGwp   = params.get('gwp') === '1';
  const hasCtx  = !!params.get('ctx');
  const isMobile = /Mobi|Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i
                     .test(navigator.userAgent)
                  || window.innerWidth < 768;

  // GWP 호출 또는 모바일 → webapp, PC → desktop
  const target = (isGwp || hasCtx || isMobile) ? 'webapp.html' : 'desktop.html';
  location.replace(target + (location.search || ''));
})();
</script>
</body>
</html>
