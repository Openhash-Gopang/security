<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>K-Security</title>
<link rel="icon" href="data:,">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%; height:100dvh; overflow:hidden;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px; background:#f2f2f7; color:#1c1c1e;
  -webkit-font-smoothing:antialiased;
}
:root {
  --acc:     #1c1c1e;
  --acc-lt:  #3a3a3c;
  --bg:      #f2f2f7;
  --sur:     #ffffff;
  --sep:     #e5e5ea;
  --txt2:    #8e8e93;
  --blue:    #007aff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

/* ── 앱 레이아웃 ── */
#app { display:flex; flex-direction:column; height:100%; height:100dvh; }

/* ── 상단바 ── */
.topbar {
  display:flex; align-items:center;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:var(--sur); border-bottom:.5px solid var(--sep);
  gap:10px; flex-shrink:0; min-height:52px;
}
.back-btn {
  background:none; border:none; color:var(--blue);
  font-size:16px; cursor:pointer; padding:4px 0;
  display:flex; align-items:center; gap:3px; flex-shrink:0;
}
.back-btn svg {
  width:9px; height:14px; stroke:var(--blue);
  stroke-width:2.5; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}
.topbar-center { flex:1; text-align:center; }
.topbar-title  { font-size:16px; font-weight:600; }
.topbar-sub    { font-size:11px; color:var(--txt2); margin-top:1px; }
.auth-badge {
  background:#f2f2f7; color:var(--acc-lt);
  border-radius:8px; padding:3px 8px;
  font-size:11px; font-weight:600; flex-shrink:0;
}

/* ── 채팅 ── */
#chat-body {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:12px 16px; display:flex; flex-direction:column;
  gap:8px; background:var(--bg);
}
.date-div {
  text-align:center; font-size:12px; color:var(--txt2); padding:4px 0 6px;
}
.bubble-ai {
  display:flex; align-items:flex-end; gap:8px;
  max-width:88%; align-self:flex-start;
}
.ai-av {
  width:28px; height:28px; border-radius:50%;
  background:var(--acc); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.ai-av svg { width:15px; height:15px; }
.bubble-ai-txt {
  background:var(--sur); border-radius:18px 18px 18px 4px;
  padding:10px 14px; font-size:15px; line-height:1.5;
  box-shadow:0 1px 2px rgba(0,0,0,.06); word-break:break-word;
}
.bubble-ai-txt b { font-weight:600; }
.bubble-ai-time {
  font-size:10px; color:var(--txt2); margin-top:2px; padding-left:36px;
}
.bubble-user {
  display:flex; flex-direction:column; align-items:flex-end;
  max-width:88%; align-self:flex-end;
}
.bubble-user-txt {
  background:var(--acc); border-radius:18px 18px 4px 18px;
  padding:10px 14px; font-size:15px; line-height:1.5;
  color:#fff; word-break:break-word;
}
.bubble-user-time {
  font-size:10px; color:var(--txt2); margin-top:2px; text-align:right;
}
.typing {
  display:flex; align-items:flex-end; gap:8px; align-self:flex-start;
}
.typing-dots {
  background:var(--sur); border-radius:18px; padding:12px 16px;
  display:flex; gap:5px; box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.typing-dots span {
  width:7px; height:7px; border-radius:50%; background:#c7c7cc;
  animation:td 1.2s infinite;
}
.typing-dots span:nth-child(2){ animation-delay:.2s }
.typing-dots span:nth-child(3){ animation-delay:.4s }
@keyframes td { 0%,60%,100%{transform:none;opacity:.5} 30%{transform:translateY(-5px);opacity:1} }

/* ── 완료 배너 ── */
.done-banner {
  display:none; margin:8px 16px; padding:14px 16px;
  background:var(--sur); border:.5px solid var(--sep);
  border-radius:14px; flex-shrink:0;
}
.done-banner.show { display:block; }
.done-banner p  { font-size:12px; color:#374151; line-height:1.5; margin-bottom:12px; }
.done-btns      { display:flex; gap:8px; }
.btn-done {
  flex:1; padding:10px; border-radius:10px;
  background:var(--acc); color:#fff;
  border:none; font-size:14px; font-weight:600; cursor:pointer;
}
.btn-more {
  flex:1; padding:10px; border-radius:10px;
  background:var(--bg); color:#374151;
  border:.5px solid var(--sep); font-size:14px; cursor:pointer;
}

/* ── 빠른 칩 ── */
.chips {
  display:flex; gap:8px; padding:6px 16px 8px;
  overflow-x:auto; scrollbar-width:none; flex-shrink:0; background:var(--bg);
}
.chips::-webkit-scrollbar { display:none; }
.chip {
  background:var(--sur); border:.5px solid var(--sep);
  border-radius:16px; padding:6px 14px;
  font-size:13px; color:var(--blue);
  white-space:nowrap; cursor:pointer; flex-shrink:0;
}
.chip:active { background:#e8f0fe; }

/* ── 입력 ── */
.input-area {
  background:var(--sur); border-top:.5px solid var(--sep);
  padding:8px 12px calc(8px + var(--safe-bot));
  display:flex; align-items:flex-end; gap:8px; flex-shrink:0;
}
.input-wrap {
  flex:1; background:var(--bg); border:.5px solid var(--sep);
  border-radius:20px; display:flex; align-items:flex-end; padding:6px 12px;
}
.input-wrap:focus-within { border-color:#8e8e93; }
#msg-input {
  flex:1; background:none; border:none; outline:none;
  font-family:inherit; font-size:15px; color:#1c1c1e;
  resize:none; max-height:100px; line-height:1.4;
}
#msg-input::placeholder { color:#c7c7cc; }
.send-btn {
  width:34px; height:34px; border-radius:50%;
  background:var(--acc); border:none; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .15s;
}
.send-btn:disabled { background:#c7c7cc; cursor:not-allowed; }
.send-btn svg { width:15px; height:15px; fill:#fff; }

/* ── 로딩 ── */
#auth-loading {
  position:fixed; inset:0; z-index:9999; background:var(--sur);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
}
.spinner {
  width:26px; height:26px; border:2.5px solid #e5e5ea;
  border-top-color:var(--acc); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="auth-loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--txt2)">고팡 인증 확인 중…</div>
</div>

<div id="app" style="display:none">

  <div class="topbar">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 9 14"><polyline points="8 1 1 7 8 13"/></svg>
      고팡
    </button>
    <div class="topbar-center">
      <div class="topbar-title">K-Security</div>
      <div class="topbar-sub" id="topbar-sub">고팡 생태계 보안</div>
    </div>
    <span class="auth-badge" id="auth-badge">L0</span>
  </div>

  <div id="chat-body"></div>

  <div class="chips" id="chips">
    <div class="chip" onclick="send('시스템 보안 현황을 알려주세요')">보안 현황</div>
    <div class="chip" onclick="send('이상 징후가 있나요?')">이상 징후</div>
    <div class="chip" onclick="send('OpenHash 노드 상태는?')">OpenHash</div>
    <div class="chip" onclick="send('최근 보안 이벤트를 알려주세요')">이벤트 내역</div>
  </div>

  <div class="done-banner" id="done-banner">
    <p id="done-summary">보안 상담 내용을 고팡 PDV에 기록하고 돌아가시겠습니까?</p>
    <div class="done-btns">
      <button class="btn-done" onclick="finish()">기록 후 복귀</button>
      <button class="btn-more" onclick="hideBanner()">계속하기</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="보안 관련 질문을 입력하세요…"></textarea>
    </div>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

</div>

<script src="js/config.js" onerror="void 0"></script>
<script type="module" src="https://gopang.net/auth/subsystem-auth.js" data-svc="security"></script>
<script>
// ── 상태 ──────────────────────────────────────────────────
let _user = null, _history = [], _msgCnt = 0, _start = new Date();
const _p      = new URLSearchParams(location.search);
const _isGwp  = _p.get('gwp') === '1';
const _origin = _p.get('origin') || 'https://gopang.net';
let   _ctx    = null;
try { _ctx = _p.get('ctx') ? decodeURIComponent(_p.get('ctx')) : null; } catch {}

// ── 유틸 ─────────────────────────────────────────────────
const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const md   = s => s.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
const fmt  = d => d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
const scrl = () => { const b=document.getElementById('chat-body'); setTimeout(()=>b.scrollTop=b.scrollHeight,50); };

// ── 아바타 SVG ────────────────────────────────────────────
const AV_SVG = `<svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M7.5 2L12 4.5V9C12 11.5 10 13.7 7.5 14.5C5 13.7 3 11.5 3 9V4.5L7.5 2Z"
        stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
</svg>`;

// ── 메시지 렌더링 ─────────────────────────────────────────
function appendAI(text) {
  const w = document.createElement('div');
  w.className = 'bubble-ai';
  w.innerHTML = `<div class="ai-av">${AV_SVG}</div>
    <div class="bubble-ai-txt">${md(text)}</div>`;
  document.getElementById('chat-body').appendChild(w);
  const t = document.createElement('div');
  t.className = 'bubble-ai-time';
  t.textContent = fmt(new Date());
  document.getElementById('chat-body').appendChild(t);
  scrl();
}
function appendUser(text) {
  const w = document.createElement('div');
  w.className = 'bubble-user';
  w.innerHTML = `<div class="bubble-user-txt">${esc(text)}</div>
    <div class="bubble-user-time">${fmt(new Date())}</div>`;
  document.getElementById('chat-body').appendChild(w);
  scrl();
}
function showTyping() {
  const el = document.createElement('div');
  el.id = 'typing'; el.className = 'typing';
  el.innerHTML = `<div class="ai-av">${AV_SVG}</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  document.getElementById('chat-body').appendChild(el);
  scrl();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── AI 호출 ───────────────────────────────────────────────
async function callAI(userMsg) {
  _history.push({ role:'user', content:userMsg });
  const res = await fetch('https://gopang-proxy.tensor-city.workers.dev/deepseek', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      model:'deepseek-chat', max_tokens:600, temperature:0.4,
      messages:[
        { role:'system', content:`당신은 K-Security AI입니다.
고팡 생태계(gopang, school, health, traffic, gdc, klaw, police, 911, tax, stock,
insurance, market, logistics, public, democracy, OpenHash L1~L5 등 22개 시스템)의
보안 상태를 모니터링하고 이상 징후를 분석합니다.
간결하고 명확하게 답변하세요.` },
        ..._history,
      ],
    }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data  = await res.json();
  const reply = data.choices?.[0]?.message?.content || '(응답 없음)';
  _history.push({ role:'assistant', content:reply });
  return reply;
}

// ── 메시지 전송 ───────────────────────────────────────────
async function send(text) {
  text = text?.trim() || document.getElementById('msg-input').value.trim();
  if (!text) return;
  document.getElementById('chips').style.display = 'none';
  document.getElementById('msg-input').value = '';
  document.getElementById('msg-input').style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  appendUser(text);
  _msgCnt++;
  showTyping();
  try {
    const reply = await callAI(text);
    hideTyping(); appendAI(reply);
    await saveToSupabase(text, reply);
    if (_msgCnt > 0 && _msgCnt % 4 === 0) suggestDone();
  } catch(e) {
    hideTyping();
    appendAI('⚠️ 일시적 오류가 발생했습니다. 다시 시도해 주세요.');
  }
  document.getElementById('send-btn').disabled = false;
}

// ── Supabase 원본 저장 ────────────────────────────────────
async function saveToSupabase(userMsg, aiReply) {
  const url  = typeof SUPA_URL  !== 'undefined' ? SUPA_URL  : null;
  const anon = typeof SUPA_ANON !== 'undefined' ? SUPA_ANON : null;
  if (!url || !anon) return;
  try {
    await fetch(`${url}/rest/v1/security_sessions`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': anon, 'Authorization':'Bearer '+anon,
        'Prefer':'return=minimal',
      },
      body: JSON.stringify({
        user_ipv6:  _user?.ipv6 || null,
        auth_level: _user?.level || 'L0',
        user_msg:   userMsg,
        ai_reply:   aiReply,
        ctx:        _ctx,
        created_at: new Date().toISOString(),
      }),
    });
  } catch {}
}

// ── 6하원칙 보고서 ────────────────────────────────────────
function buildReport() {
  const mins = Math.round((new Date() - _start) / 60000);
  const now  = new Date().toISOString();
  return {
    svc: 'security', type: 'security_session',
    who:  { ipv6: _user?.ipv6||null, level: _user?.level||'L0' },
    when: { start: _start.toISOString(), end: now, duration_min: mins },
    where:{ url: 'security.gopang.net', ctx: _ctx||'direct' },
    what: { summary:`K-Security 보안 상담 ${mins}분 ${_msgCnt}회`, msg_count: _msgCnt },
    how:  { method:'AI 채팅 (DeepSeek V3)' },
    why:  { triggered: _isGwp ? 'gopang_gwp' : 'direct' },
  };
}

// ── 완료 처리 ─────────────────────────────────────────────
function suggestDone() {
  const mins = Math.round((new Date() - _start) / 60000);
  document.getElementById('done-summary').textContent =
    `${mins}분, ${_msgCnt}회 대화 — 고팡 PDV에 기록하고 복귀하시겠습니까?`;
  document.getElementById('done-banner').classList.add('show');
  scrl();
}
function hideBanner() {
  document.getElementById('done-banner').classList.remove('show');
}

async function finish() {
  const btn = document.querySelector('.btn-done');
  btn.textContent = '기록 중…'; btn.disabled = true;

  const report = buildReport();

  // PDV 전송
  try {
    await fetch('https://gopang-proxy.tensor-city.workers.dev/pdv/report', {
      method:'POST', headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ report }),
    });
  } catch {}

  appendAI('보안 상담 기록이 고팡 PDV에 저장되었습니다. ✓');
  hideBanner();

  // gopang에 결과 전달
  const payload = { type:'GWP_SESSION_COMPLETE', svc:'security', report };
  try {
    if (window.opener) window.opener.postMessage(payload, _origin);
    else if (window.parent !== window) window.parent.postMessage(payload, _origin);
  } catch {}

  // 1.5초 후 닫기
  setTimeout(() => {
    try {
      if (window.opener)              { window.close(); return; }
      if (window.parent !== window)   { window.parent.postMessage({type:'GWP_CLOSE',svc:'security'}, _origin); return; }
    } catch {}
    location.href = 'https://gopang.net';
  }, 1500);
}

function goBack() {
  if (_msgCnt === 0) {
    try {
      if (window.opener)            { window.close(); return; }
      if (window.parent !== window) { window.parent.postMessage({type:'GWP_CLOSE',svc:'security'}, _origin); return; }
    } catch {}
    location.href = 'https://gopang.net';
  } else {
    suggestDone();
  }
}

// ── 입력 이벤트 ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
    btn.disabled = !inp.value.trim();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btn.disabled) send(); }
  });
  btn.addEventListener('click', () => send());
});

// ── 환영 메시지 ───────────────────────────────────────────
function showWelcome() {
  const d = document.createElement('div');
  d.className = 'date-div';
  d.textContent = new Date().toLocaleDateString('ko-KR',
    { month:'long', day:'numeric', weekday:'short' });
  document.getElementById('chat-body').appendChild(d);

  let msg = `안녕하세요. K-Security AI입니다.\n\n`;
  if (_ctx) {
    msg += `**"${_ctx}"** 요청을 받았습니다.\n바로 확인하겠습니다.`;
  } else {
    msg += `고팡 생태계 22개 시스템의 보안 상태를\n질문하거나 이상 징후를 보고해 주세요.`;
  }
  appendAI(msg);
}

// ── 인증 콜백 ─────────────────────────────────────────────
window._onGopangAuth = async function(user) {
  if (!user) return;
  _user = user;
  document.getElementById('auth-loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('auth-badge').textContent = user.level || 'L0';
  if (user.level && user.level !== 'L0')
    document.getElementById('topbar-sub').textContent = `K-Security · ${user.level}`;
  try { sessionStorage.setItem('gopang_sso_token', JSON.stringify(user)); } catch {}
  showWelcome();
  if (_ctx) setTimeout(() => send(_ctx), 600);
  const c = new URL(location.href);
  ['gwp','gwp_token','ctx','origin'].forEach(k => c.searchParams.delete(k));
  history.replaceState({}, '', c.toString());
};
</script>
<script
  src="https://security.gopang.net/security-agent.js"
  data-svc="security"
  data-url="security.gopang.net">
</script>
</body>
</html>
